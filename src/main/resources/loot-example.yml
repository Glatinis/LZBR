# ----------------------------------------------------------------------------
#  4. Chest locations
# ----------------------------------------------------------------------------
#  Best set in-game: look at a placed chest and run /lzbr loot chest add. They
#  are saved here automatically. You can also add them by hand.
#
#  facing is the direction the chest opening points (NORTH/EAST/SOUTH/WEST); it
#  is re-applied every match so chests always look the same after a reset.
# ----------------------------------------------------------------------------
chest-locations: []
#  Example:
#  - world: br
#    x: 12
#    y: 65
#    z: -8
#    facing: NORTH
