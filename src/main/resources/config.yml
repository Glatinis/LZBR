# ============================================================================
#  LZBR — LiveZone Battle Royale
# ----------------------------------------------------------------------------
#  Times are in seconds unless a key says otherwise; tick-based values say so.
# ============================================================================

# Player limits for a match.
players:
  minimum: 2
  maximum: 25

# Worlds, by their Multiverse-Core names.
worlds:
  lobby: lobby
  br: br

# The shrinking play zone.
zone:
  # Center of the zone, in BR-world coordinates.
  center:
    x: 0
    z: 0
  # Zone radius in blocks, at the start and end of the shrink.
  radius:
    initial: 500
    final: 50
  # When and how long the zone takes to shrink.
  shrink:
    delay-seconds: 60        # wait this long after the match starts before shrinking
    duration-seconds: 300    # shrink from initial to final radius over this long
    # Center-screen telegraph shown/played shortly before the shrink begins.
    # title/subtitle use MiniMessage formatting; {seconds} is replaced with the countdown.
    telegraph:
      enabled: true
      lead-seconds: 10                                       # how long before the shrink to warn
      title: "<red><bold>ZONE CLOSING IN</bold></red>"
      subtitle: "<yellow>The zone shrinks in {seconds}s</yellow>"
      fade-in-ticks: 10
      stay-ticks: 40
      fade-out-ticks: 10
      sound:
        key: "minecraft:block.note_block.pling"             # any Minecraft sound id, or "" for none
        volume: 1.0
        pitch: 1.0
  # Damage dealt to players the zone has swept outside.
  damage:
    amount: 1.0              # damage per interval (2.0 = one heart)
    interval-ticks: 20       # ticks between damage applications (20 ticks = 1s)
  # Border wall warning (the client's red screen tint near the edge).
  warning:
    distance-blocks: 5
    time-seconds: 10

# Match flow — the countdown before the zone goes live, and the win screen.
# All title/subtitle/broadcast fields use MiniMessage formatting.
game:
  # Center-screen countdown shown after an admin starts, before the match goes live.
  # {seconds} is replaced with the number remaining.
  countdown:
    seconds: 10
    title: "<yellow>Match starting</yellow>"
    subtitle: "<red><bold>{seconds}</bold></red>"
    sound:
      key: "minecraft:block.note_block.hat"
      volume: 1.0
      pitch: 1.0
  # Shown the moment the match goes live.
  start:
    title: "<green><bold>GO!</bold></green>"
    subtitle: "<gray>Last player standing wins</gray>"
    fade-in-ticks: 5
    stay-ticks: 30
    fade-out-ticks: 10
    sound:
      key: "minecraft:entity.ender_dragon.growl"
      volume: 1.0
      pitch: 1.0
  # Shown when the match ends. {winner} is replaced with the winner's name.
  win:
    title: "<gold><bold>VICTORY</bold></gold>"
    subtitle: "<yellow>{winner} won the match</yellow>"
    broadcast: "<gold>{winner}</gold> <yellow>won the Battle Royale!</yellow>"
    no-winner-broadcast: "<yellow>The match ended with no winner.</yellow>"
    fade-in-ticks: 10
    stay-ticks: 60
    fade-out-ticks: 20
    sound:
      key: "minecraft:ui.toast.challenge_complete"
      volume: 1.0
      pitch: 1.0
    return-delay-seconds: 5    # linger on the win screen before sending everyone to the lobby

# Arena reset between rounds.
#
# Pastes a schematic over the BR world so each round starts from a clean arena,
# without regenerating the whole world. Requires FastAsyncWorldEdit (async paste).
arena:
  reset:
    enabled: true
    # Schematic file to paste, located in plugins/LZBR/schematics/
    schematic: arena.schem
    # BR-world coordinates the schematic's origin is pasted at.
    origin:
      x: 0
      y: 64
      z: 0
    # Paste air blocks from the schematic too — true fully overwrites the area,
    # clearing anything players built; false leaves existing blocks where the
    # schematic has air.
    paste-air: true
    # Also restore entities saved in the schematic (item frames, armor stands, …).
    paste-entities: false
